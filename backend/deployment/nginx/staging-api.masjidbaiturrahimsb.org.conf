# HTTP only — obtain SSL with Certbot after DNS points here.
# Install: sudo cp deployment/nginx/staging-api.masjidbaiturrahimsb.org.conf /etc/nginx/sites-available/
#          sudo ln -sf /etc/nginx/sites-available/staging-api.masjidbaiturrahimsb.org.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name staging-api.masjidbaiturrahimsb.org;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
