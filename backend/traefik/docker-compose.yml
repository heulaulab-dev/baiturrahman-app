version: "3.8"

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik.yml:/etc/traefik/traefik.yml
      - ./letsencrypt:/letsencrypt
    labels:
      # Dashboard router with basic auth (optional)
      # Generate password with: htpasswd -nb user password
      # - "traefik.http.routers.dashboard.rule=Host(`dashboard.your-domain.com`)"
      # - "traefik.http.routers.dashboard.tls=true"
      # - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.dashboard.service=api@internal"
      # - "traefik.http.middlewares.auth.basicauth.users=user:$$apr1$$hash"
    networks:
      - traefik-network

networks:
  traefik-network:
    external: true
