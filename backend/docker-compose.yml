services:
  postgres:
    image: postgres:15-alpine
    container_name: baiturrahim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ../postgres-data:/var/lib/postgresql/data
    networks:
      - baiturrahim-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: baiturrahim-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    volumes:
      - minio_data:/data
    networks:
      - baiturrahim-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: baiturrahim-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT}:8080"
    environment:
      PORT: 8080
      ENVIRONMENT: ${ENVIRONMENT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      MINIO_ENDPOINT: http://minio:${MINIO_API_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_OBJECT_URL: ${MINIO_OBJECT_URL}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - baiturrahim-network

networks:
  baiturrahim-network:
    driver: bridge

volumes:
  minio_data: